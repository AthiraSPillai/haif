name: haif-check

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run build
      - run: npm test
      - run: node packages/cli/dist/index.js validate
      - uses: actions/setup-python@v5
        with:
          python-version: "3.8"
      - run: python -m unittest discover -s packages/python/tests
        env:
          PYTHONPATH: packages/python/src
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m unittest discover -s packages/python/tests
        env:
          PYTHONPATH: packages/python/src
