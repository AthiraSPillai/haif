<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">HAIF AI agent coordination debt flow</title>
  <desc id="desc">A HAIF flow diagram showing partial context feeding multiple AI agents, which produce plausible artifacts and create coordination debt without shared intent.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2f3a4a"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#162033" flood-opacity="0.14"/>
    </filter>
    <style>
      .bg { fill: #f7f5ef; }
      .title { font: 700 32px Arial, sans-serif; fill: #172033; }
      .subtitle { font: 400 17px Arial, sans-serif; fill: #526071; }
      .brand { font: 700 15px Arial, sans-serif; fill: #2f5d48; letter-spacing: 0.4px; }
      .box { fill: #ffffff; stroke: #d6d1c5; stroke-width: 2; rx: 8; filter: url(#shadow); }
      .box-alt { fill: #eef6f2; stroke: #8bb8a2; stroke-width: 2; rx: 8; filter: url(#shadow); }
      .box-warn { fill: #fff3df; stroke: #dfaa52; stroke-width: 2; rx: 8; filter: url(#shadow); }
      .label { font: 700 21px Arial, sans-serif; fill: #172033; }
      .small { font: 400 15px Arial, sans-serif; fill: #526071; }
      .pill { fill: #f0ece3; stroke: #d6d1c5; stroke-width: 1.4; rx: 16; }
      .pill-text { font: 600 15px Arial, sans-serif; fill: #394657; }
      .arrow { stroke: #2f3a4a; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1200" height="720"/>
  <rect x="70" y="34" width="392" height="30" rx="15" fill="#e6f1eb" stroke="#8bb8a2"/>
  <text class="brand" x="90" y="54">HAIF: Human-Agent Intent Framework</text>
  <text class="title" x="70" y="96">How Coordination Debt Forms</text>
  <text class="subtitle" x="70" y="127">AI agents can produce coherent artifacts from different slices of truth.</text>

  <rect class="box" x="70" y="165" width="250" height="225" rx="8"/>
  <text class="label" x="105" y="210">Partial Context</text>
  <rect class="pill" x="105" y="240" width="95" height="32" rx="16"/>
  <text class="pill-text" x="129" y="262">Jira</text>
  <rect class="pill" x="215" y="240" width="95" height="32" rx="16"/>
  <text class="pill-text" x="244" y="262">Slack</text>
  <rect class="pill" x="105" y="286" width="95" height="32" rx="16"/>
  <text class="pill-text" x="130" y="308">Docs</text>
  <rect class="pill" x="215" y="286" width="95" height="32" rx="16"/>
  <text class="pill-text" x="243" y="308">Code</text>
  <text class="small" x="105" y="345">No single source owns</text>
  <text class="small" x="105" y="366">full shared intent</text>

  <path class="arrow" d="M330 267 C370 267, 390 267, 430 267"/>

  <rect class="box-alt" x="440" y="150" width="270" height="255" rx="8"/>
  <text class="label" x="486" y="196">Multiple Agents</text>
  <circle cx="515" cy="252" r="34" fill="#ffffff" stroke="#8bb8a2" stroke-width="2"/>
  <text class="pill-text" x="494" y="257">Agent A</text>
  <circle cx="635" cy="252" r="34" fill="#ffffff" stroke="#8bb8a2" stroke-width="2"/>
  <text class="pill-text" x="614" y="257">Agent B</text>
  <circle cx="575" cy="320" r="34" fill="#ffffff" stroke="#8bb8a2" stroke-width="2"/>
  <text class="pill-text" x="554" y="325">Agent C</text>

  <path class="arrow" d="M720 267 C760 267, 780 267, 820 267"/>

  <rect class="box" x="830" y="145" width="300" height="295" rx="8"/>
  <text class="label" x="882" y="190">Plausible Artifacts</text>
  <rect class="pill" x="875" y="225" width="100" height="32" rx="16"/>
  <text class="pill-text" x="898" y="247">Tickets</text>
  <rect class="pill" x="990" y="225" width="90" height="32" rx="16"/>
  <text class="pill-text" x="1017" y="247">Plans</text>
  <rect class="pill" x="875" y="272" width="90" height="32" rx="16"/>
  <text class="pill-text" x="903" y="294">Docs</text>
  <rect class="pill" x="980" y="272" width="70" height="32" rx="16"/>
  <text class="pill-text" x="1000" y="294">PRs</text>
  <rect class="pill" x="875" y="319" width="125" height="32" rx="16"/>
  <text class="pill-text" x="897" y="341">Summaries</text>
  <text class="small" x="875" y="384">Useful, but not necessarily</text>
  <text class="small" x="875" y="406">aligned as a team</text>

  <path class="arrow" d="M980 452 C980 480, 980 493, 980 515"/>

  <rect class="box-warn" x="765" y="525" width="430" height="125" rx="8"/>
  <text class="label" x="820" y="572">Coordination Debt</text>
  <text class="small" x="820" y="606">Duplicates | Drift | Conflicts | Rework</text>
  <text class="small" x="820" y="628">Trust loss</text>

  <path class="arrow" d="M755 650 C640 680, 520 675, 455 632"/>
  <rect class="box-alt" x="285" y="470" width="340" height="130" rx="8"/>
  <text class="label" x="330" y="515">HAIF Shared Intent Layer</text>
  <text class="small" x="330" y="550">Proposal | Ownership | Review</text>
  <text class="small" x="330" y="573">Approval | Provenance</text>
</svg>
